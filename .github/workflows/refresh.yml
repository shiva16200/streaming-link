name: हरेक दिन स्वचालित लिङ्क ताजा

# कहिले चलाउने?
on:
  # हरेक दिन दिउँसो १२ बजे (UTC)
  schedule:
    - cron: '0 0 * * *'
  
  # म्यानुअल्ली पनि चलाउन सकिन्छ
  workflow_dispatch:

# के गर्ने?
jobs:
  refresh:
    # Ubuntu मा चलाउने
    runs-on: ubuntu-latest
    
    steps:
      # १. रिपोजिटरी डाउनलोड गर्ने
      - name: काम गर्ने ठाउँ तयार गर्नुहोस्
        uses: actions/checkout@v3
      
      # २. पाइथन सेटअप गर्ने
      - name: पाइथन ३.९ सेटअप गर्नुहोस्
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      # ३. नयाँ लिङ्क बनाउने
      - name: नयाँ लिङ्क बनाउनुहोस्
        run: python3 generate_link.py
      
      # ४. GitHub मा पठाउने
      - name: GitHub मा सेभ गर्नुहोस्
        run: |
          git config user.name "स्वचालित बोट"
          git config user.email "bot@github.com"
          git add .
          git commit -m "🔄 नयाँ लिङ्क - $(date)" || echo "केही परिवर्तन भएन"
          git push
